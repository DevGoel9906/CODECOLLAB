<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | CodeCollab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="user profile editor page ka design CSS file.css">
</head>
<body>

    <div class="container">
        <a href="../user_dashboard_system/dashboard page.html" style="color: var(--text-muted); text-decoration: none; margin-bottom: 2rem; display: inline-block;">← Back to Dashboard</a>
        
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Profile Settings</h1>
                <button type="button" id="add-new-profile-btn" style="background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">+ Add New Profile</button>
            </div>
            
            <img src="https://i.pravatar.cc/150?u=4" alt="Profile Preview" class="avatar-preview" id="preview-img">
            
            <form id="profile-form">
                <div class="form-group">
                    <label for="display-name">Display Name</label>
                    <input type="text" id="display-name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="avatar-url">Avatar Image URL</label>
                    <input type="url" id="avatar-url" placeholder="https://example.com/photo.jpg">
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">Paste any image link to update your avatar.</p>
                </div>

                <div class="form-group">
                    <label for="bio">Short Bio</label>
                    <textarea id="bio" rows="4" placeholder="Tell us about your coding skills..."></textarea>
                </div>

                <button type="submit" class="btn-save">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="user profile editor page ka logic Javascript file.js"></script>
</body>
</html>
