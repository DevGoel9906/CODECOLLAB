<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Project | CodeCollab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="add project page ka design CSS file.css">
</head>
<body>

    <div class="container">
        <a href="../index.html" style="color: var(--text-muted); text-decoration: none; margin-bottom: 2rem; display: inline-block;">← Back to Home</a>
        
        <div class="glass-card">
            <h1>Launch Your Project</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Fill in the details to list your project on CodeCollab.</p>
            
            <div class="preview-container" id="image-preview">
                <span></span>
                <img id="preview-img" src="" alt="Preview">
            </div>
            <p class="error-text hidden" id="image-error">Your image must be under 10MB and in JPG/PNG format.</p>

            <form id="add-project-form">
                <div class="form-group">
                    <label for="p-creator">Your Name</label>
                    <input type="text" id="p-creator" placeholder="e.g. John Doe" required>
                </div>

                <div class="form-group">
                    <label for="p-title">Project Title</label>
                    <input type="text" id="p-title" placeholder="e.g. HealthTracker AI" required>
                </div>

                <div class="form-group">
                    <label for="p-category">Category</label>
                    <select id="p-category">
                        <option value="Web">Web Development</option>
                        <option value="AI">Artificial Intelligence</option>
                        <option value="Security">Cyber Security</option>
                        <option value="Design">UI/UX Design</option>
                        <option value="Systems">Systems Programming</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="p-image-file">Upload Cover Image</label>
                    <input type="file" id="p-image-file" accept="image/*">
                    <small style="color: var(--text-muted);">Image files only. Max size 10MB.</small>
                </div>

                <div class="form-group">
                    <label for="p-github">GitHub Repository Link (URL)</label>
                    <input type="url" id="p-github" placeholder="https://github.com/profile/repo" required>
                </div>

                <div class="form-group">
                    <label for="p-tech">Tech Stack (comma separated)</label>
                    <input type="text" id="p-tech" placeholder="React, Python, Firebase" required>
                </div>

                <div class="form-group">
                    <label for="p-desc">Short Description</label>
                    <textarea id="p-desc" rows="3" placeholder="Explain what your project solves..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="p-progress">Current Progress (%)</label>
                    <input type="number" id="p-progress" min="0" max="100" value="0">
                </div>

                <div class="form-group" id="maintainers-group">
                    <label>Core Maintainers</label>
                    <div id="maintainers-container">
                        <div class="maintainer-entry" style="background: rgba(255,255,255,0.02); padding: 1rem; border-radius: 10px; margin-bottom: 1rem; border: 1px solid var(--glass-border);">
                            <input type="text" class="m-name" placeholder="Full Name" required style="margin-bottom: 0.5rem; width: 100%; padding: 0.8rem; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white;">
                            <input type="url" class="m-linkedin" placeholder="LinkedIn Profile URL" required style="margin-bottom: 0.5rem; width: 100%; padding: 0.8rem; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white;">
                            <input type="url" class="m-github" placeholder="GitHub Profile URL" required style="margin-bottom: 0.5rem; width: 100%; padding: 0.8rem; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white;">
                            <button type="button" class="btn-remove-maintainer" style="background: #ff5f5f; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; display: none;">Remove Maintainer</button>
                        </div>
                    </div>
                    <button type="button" id="btn-add-maintainer" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer;">+ Add Maintainer</button>
                </div>

                <button type="submit" class="btn-submit">Add Project to Platform</button>
            </form>
        </div>
    </div>

    <!-- Global Config & API Client (Security Architecture) -->
    <script src="../services/config.js"></script>
    <script src="../services/securityModal.js"></script>
    <script src="../services/apiClient.js"></script>

    <script src="add project page ka logic Javascript file.js"></script>
</body>
</html>
