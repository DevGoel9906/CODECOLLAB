<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CodeCollab</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Design system CSS -->
    <link rel="stylesheet" href="../design_system.css">
    <!-- Dashboard page CSS -->
    <link rel="stylesheet" href="dashboard page ka design CSS file.css">
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="../index.html" class="logo">CodeCollab</a>
        <nav style="display:flex; flex-direction:column; gap:0.5rem;">
            <a href="#" class="nav-item active">
                <span>📊</span> Dashboard
            </a>
            <a href="#project-status-section" class="nav-item">
                <span>🔍</span> Project Status
            </a>
            <a href="../admin_and_user_settings/index.html" class="nav-item">
                <span>🛠️</span> Manage Requests
            </a>
            <a href="javascript:void(0)" class="nav-item" id="sidebar-profile-btn" style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem; margin-top: 1.5rem;">
                <span>👤</span> Profile Settings
            </a>
        </nav>
        
        <div style="margin-top: auto;">
            <a href="javascript:void(0)" class="nav-item" style="color: #ff5f5f;" onclick="localStorage.clear(); window.location.href='../index.html';">
                <span>🚪</span> Logout
            </a>
        </div>
    </aside>

    <!-- Main Section -->
    <main class="main-content">
        <header class="header fade-in" style="justify-content: flex-start;">
            <div>
                <h1 style="font-size:2.5rem; font-weight:800; color:var(--text-main); margin-bottom: 0.5rem;">Dashboard Workspace</h1>
                <p id="user-bio" style="color: var(--text-muted); font-size:1rem;"></p>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card fade-in" style="animation-delay: 0.1s;">
                <span class="stat-title">Total Requests</span>
                <span class="stat-num" id="total-req">0</span>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.2s;">
                <span class="stat-title">Pending</span>
                <span class="stat-num" id="pending-req" style="color: #fbbf24;">0</span>
            </div>
            <div class="stat-card fade-in" style="animation-delay: 0.3s;">
                <span class="stat-title">Accepted</span>
                <span class="stat-num" id="accepted-req" style="color: var(--accent);">0</span>
            </div>
        </div>

        <!-- Project Status Section -->
        <section class="fade-in" style="animation-delay: 0.4s; margin-top: 3rem;" id="project-status-section">
            <h2 class="section-title">Project Applications</h2>
            <div id="project-status-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                <!-- Content injected by JS -->
            </div>
        </section>
    </main>

    <!-- Centralized configuration scripts loading -->
    <script src="../services/config.js"></script>
    <script src="../services/securityModal.js"></script>
    <script src="../services/comingSoonModal.js"></script>
    <script src="../services/apiClient.js"></script>
    <script src="../services/profileModal.js"></script>

    <script src="dashboard page ka logic Javascript file.js"></script>
</body>
</html>
